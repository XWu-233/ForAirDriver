<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Files 目录列表</title>
</head>
<body>
    <h1>📁 files 目录中的文件</h1>
    <ul id="fileList"></ul>

    <script>
        async function fetchFileList() {
            const listEl = document.getElementById('fileList');
            try {
                // 直接请求同目录下的 filelist.json 文件
                const response = await fetch('filelist.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const files = await response.json();

                if (files.length === 0) {
                    listEl.innerHTML = '<li>文件夹为空</li>';
                    return;
                }

                // 清空并渲染文件列表
                listEl.innerHTML = '';
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = `📄 ${file}`; // file 的格式如 "files/a.txt"
                    listEl.appendChild(li);
                });

            } catch (error) {
                listEl.innerHTML = `<li>❌ 加载失败：${error.message}</li>`;
                console.error('加载 filelist.json 失败：', error);
            }
        }

        fetchFileList();
    </script>
</body>
</html>
